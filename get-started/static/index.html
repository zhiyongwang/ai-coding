<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
            background-color: #000;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .calculator {
            width: 100%;
            max-width: 375px;
            padding: 20px;
        }

        .display {
            height: 180px;
            display: flex;
            align-items: flex-end;
            justify-content: flex-end;
            padding: 0 10px 20px;
            margin-bottom: 10px;
        }

        .result {
            font-size: 80px;
            font-weight: 300;
            color: #fff;
            text-align: right;
            line-height: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 100%;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .btn {
            width: 76px;
            height: 76px;
            border-radius: 50%;
            border: none;
            font-size: 32px;
            font-weight: 400;
            cursor: pointer;
            transition: filter 0.15s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-user-select: none;
        }

        .btn:active {
            filter: brightness(1.3);
        }

        .btn-number {
            background-color: #333333;
            color: #ffffff;
        }

        .btn-operator {
            background-color: #FF9F0A;
            color: #ffffff;
        }

        .btn-function {
            background-color: #A5A5A5;
            color: #000000;
        }

        .btn-zero {
            grid-column: span 2;
            width: 100%;
            border-radius: 38px;
            justify-content: flex-start;
            padding-left: 28px;
        }

        .btn.active {
            background-color: #fff !important;
            color: #FF9F0A !important;
        }
    </style>
</head>
<body>
    <div class="calculator">
        <div class="display">
            <div class="result" id="result">0</div>
        </div>
        <div class="buttons">
            <button class="btn btn-function" data-action="clear">C</button>
            <button class="btn btn-function" data-action="negate">±</button>
            <button class="btn btn-function" data-action="percent">%</button>
            <button class="btn btn-operator" data-op="÷">÷</button>

            <button class="btn btn-number" data-num="7">7</button>
            <button class="btn btn-number" data-num="8">8</button>
            <button class="btn btn-number" data-num="9">9</button>
            <button class="btn btn-operator" data-op="×">×</button>

            <button class="btn btn-number" data-num="4">4</button>
            <button class="btn btn-number" data-num="5">5</button>
            <button class="btn btn-number" data-num="6">6</button>
            <button class="btn btn-operator" data-op="−">−</button>

            <button class="btn btn-number" data-num="1">1</button>
            <button class="btn btn-number" data-num="2">2</button>
            <button class="btn btn-number" data-num="3">3</button>
            <button class="btn btn-operator" data-op="+">+</button>

            <button class="btn btn-number btn-zero" data-num="0">0</button>
            <button class="btn btn-number" data-action="decimal">.</button>
            <button class="btn btn-operator" data-action="calculate">=</button>
        </div>
    </div>

    <script>
        let currentValue = '0';
        let previousValue = null;
        let operator = null;
        let waitingForOperand = false;

        const resultDisplay = document.getElementById('result');

        function updateDisplay() {
            const num = parseFloat(currentValue);
            if (Math.abs(num) >= 1e9) {
                resultDisplay.textContent = num.toExponential(4);
            } else {
                resultDisplay.textContent = currentValue;
            }
            // 调整字体大小以适应长数字
            const length = currentValue.length;
            if (length > 9) {
                resultDisplay.style.fontSize = '40px';
            } else if (length > 6) {
                resultDisplay.style.fontSize = '55px';
            } else {
                resultDisplay.style.fontSize = '80px';
            }
        }

        function inputDigit(digit) {
            if (waitingForOperand) {
                currentValue = digit;
                waitingForOperand = false;
            } else {
                currentValue = currentValue === '0' ? digit : currentValue + digit;
            }
            updateDisplay();
        }

        function inputDecimal() {
            if (waitingForOperand) {
                currentValue = '0.';
                waitingForOperand = false;
            } else if (!currentValue.includes('.')) {
                currentValue += '.';
            }
            updateDisplay();
        }

        function clear() {
            currentValue = '0';
            previousValue = null;
            operator = null;
            waitingForOperand = false;
            updateDisplay();
            document.querySelectorAll('.btn-operator').forEach(btn => btn.classList.remove('active'));
        }

        function negate() {
            currentValue = String(-parseFloat(currentValue));
            updateDisplay();
        }

        function percent() {
            currentValue = String(parseFloat(currentValue) / 100);
            updateDisplay();
        }

        function handleOperator(nextOperator) {
            const inputValue = parseFloat(currentValue);

            if (previousValue === null) {
                previousValue = inputValue;
            } else if (operator) {
                const result = calculate(previousValue, inputValue, operator);
                currentValue = String(result);
                previousValue = result;
                updateDisplay();
            }

            waitingForOperand = true;
            operator = nextOperator;

            // 高亮当前操作符
            document.querySelectorAll('.btn-operator').forEach(btn => btn.classList.remove('active'));
            if (nextOperator !== '=') {
                document.querySelector(`[data-op="${nextOperator}"]`)?.classList.add('active');
            }
        }

        function calculate(prev, current, op) {
            switch (op) {
                case '+': return prev + current;
                case '−': return prev - current;
                case '×': return prev * current;
                case '÷': return current !== 0 ? prev / current : 'Error';
                default: return current;
            }
        }

        // 绑定按钮事件
        document.querySelectorAll('[data-num]').forEach(btn => {
            btn.addEventListener('click', () => inputDigit(btn.dataset.num));
        });

        document.querySelectorAll('[data-op]').forEach(btn => {
            btn.addEventListener('click', () => handleOperator(btn.dataset.op));
        });

        document.querySelectorAll('[data-action]').forEach(btn => {
            btn.addEventListener('click', () => {
                const action = btn.dataset.action;
                if (action === 'clear') clear();
                else if (action === 'negate') negate();
                else if (action === 'percent') percent();
                else if (action === 'decimal') inputDecimal();
                else if (action === 'calculate') handleOperator('=');
            });
        });

        // 键盘支持
        document.addEventListener('keydown', (e) => {
            if (e.key >= '0' && e.key <= '9') inputDigit(e.key);
            else if (e.key === '.') inputDecimal();
            else if (e.key === '+') handleOperator('+');
            else if (e.key === '-') handleOperator('−');
            else if (e.key === '*') handleOperator('×');
            else if (e.key === '/') handleOperator('÷');
            else if (e.key === 'Enter' || e.key === '=') handleOperator('=');
            else if (e.key === 'Escape') clear();
            else if (e.key === 'Backspace') {
                currentValue = currentValue.length > 1 ? currentValue.slice(0, -1) : '0';
                updateDisplay();
            }
        });
    </script>
</body>
</html>
